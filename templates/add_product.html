{% extends "base.html" %}
{% block title %}Add Product — StockPilot{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">ADD PRODUCT</div>
    <div class="page-sub">Register a new item to inventory</div>
  </div>
  <a href="/products" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width: 560px;">
  <form method="POST" action="/products/add">
    <div class="form-group">
      <label class="form-label">Product Name</label>
      <input class="form-input" name="name" placeholder="e.g. Wireless Keyboard" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" name="category_id" required>
          <option value="">Select category</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Price (₹)</label>
        <input class="form-input" name="price" type="number" step="0.01" min="0" placeholder="0.00" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Initial Quantity</label>
        <input class="form-input" name="quantity" type="number" min="0" placeholder="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">Low Stock Threshold</label>
        <input class="form-input" name="threshold" type="number" min="1" placeholder="10" required>
        <p style="font-size: 11px; color: var(--muted); margin-top: 5px;">Alert when qty drops below this.</p>
      </div>
    </div>
    <button class="btn btn-primary" type="submit">Add Product</button>
  </form>
</div>
{% endblock %}
