<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StockPilot{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.12);
      --red: #ff4d4d;
      --red-dim: rgba(255, 77, 77, 0.12);
      --green: #4dff91;
      --green-dim: rgba(77, 255, 145, 0.12);
      --text: #f0f0f0;
      --muted: #777;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo h1 {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .sidebar-logo span {
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-top: 3px;
    }
    .nav {
      padding: 20px 12px;
      flex: 1;
    }
    .nav-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0 12px;
      margin-bottom: 8px;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent-dim); color: var(--accent); }
    .nav a .icon { font-size: 16px; width: 20px; text-align: center; }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 36px 40px;
      max-width: calc(100vw - 220px);
    }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .page-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .page-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 24px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-top: 8px;
      line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.red { color: var(--red); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 13px 14px; vertical-align: middle; }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-ok { background: var(--green-dim); color: var(--green); }
    .badge-low { background: var(--red-dim); color: var(--red); }
    .badge-cat { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0f0f0f; }
    .btn-primary:hover { background: #d4eb3a; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #555; }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid transparent; }
    .btn-danger:hover { border-color: var(--red); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Alerts */
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13.5px;
      margin-bottom: 24px;
      border-left: 3px solid;
    }
    .alert-success { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .alert-info { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .alert-warning { background: var(--red-dim); border-color: var(--red); color: var(--red); }

    /* Change badge in logs */
    .change-pos { color: var(--green); font-family: var(--mono); font-weight: 700; }
    .change-neg { color: var(--red); font-family: var(--mono); font-weight: 700; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 360px;
    }
    .modal h3 { font-family: var(--mono); font-size: 14px; margin-bottom: 20px; }

    /* Search bar */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar .form-input { flex: 1; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>STOCKPILOT</h1>
      <span>Inventory Manager</span>
    </div>
    <nav class="nav">
      <div class="nav-label">Menu</div>
      <a href="/" class="{{ 'active' if request.path == '/' }}">
        <span class="icon">▦</span> Dashboard
      </a>
      <a href="/products" class="{{ 'active' if '/products' in request.path }}">
        <span class="icon">◈</span> Products
      </a>
      <a href="/low-stock" class="{{ 'active' if request.path == '/low-stock' }}">
        <span class="icon">⚠</span> Low Stock
      </a>
    </nav>
  </aside>

  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else 'info' if category == 'info' else 'warning' }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
